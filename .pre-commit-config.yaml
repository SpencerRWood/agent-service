repos:
  - repo: local
    hooks:
      - id: sync-env-example
        name: Sync .env.example from .env (strip values)
        entry: scripts/sync-env-example.sh
        language: system
        pass_filenames: false
        stages: [pre-commit]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.0
    hooks:
      - id: ruff
        args: [--fix]
        files: ^backend/

      - id: ruff-format
        files: ^backend/

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: no-commit-to-branch
        args: ["--branch", "main", "--branch", "master"]

      - id: end-of-file-fixer
      - id: trailing-whitespace

      - id: check-yaml
      - id: check-toml

      - id: check-added-large-files
      - id: detect-private-key
