name: Control Hub Contract

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  contract-check:
    runs-on: ubuntu-latest
    env:
      CONTROL_HUB_CONTRACT_PATH: ${{ github.workspace }}/control-hub/contracts/openapi/control-hub.openapi.json
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check out Control Hub contract
        if: ${{ vars.CONTROL_HUB_REPOSITORY != '' }}
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.CONTROL_HUB_REPOSITORY }}
          path: control-hub
          sparse-checkout: |
            contracts/openapi/control-hub.openapi.json

      - name: Ensure Control Hub contract is available
        run: test -f "$CONTROL_HUB_CONTRACT_PATH"

      - name: Set up uv
        uses: astral-sh/setup-uv@v4

      - name: Install backend dependencies
        working-directory: backend
        run: uv sync --frozen --extra dev

      - name: Check contract compatibility
        working-directory: backend
        run: uv run python ../scripts/check_control_hub_contract.py
