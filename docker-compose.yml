services:
  app:
    image: ${AGENT_SERVICE_IMAGE:-ghcr.io/spencerrwood/agent-service:latest}
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${AGENT_SERVICE_BIND_HOST:-127.0.0.1}:${AGENT_SERVICE_HOST_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/api/health/"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
